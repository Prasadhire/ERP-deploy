apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ingress
  namespace: erp-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: erp.local
    http:
      paths:
      - path: /ERP
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

